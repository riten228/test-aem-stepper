<!--/* Stepper Form Step sub-component.
     Renders all child resources of this step node (form fields added by authors).
     Authors populate each step via the template editor by adding form field
     components as children of the step resource.
*/-->
<div class="cmp-step">
    <sly data-sly-list.field="${resource.listChildren}">
        <sly data-sly-resource="${field.name}"/>
    </sly>
</div>
